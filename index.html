<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema de Empréstimos</title>
  <link rel="stylesheet" href="style.css"/>
  <!-- Se quiser customizações extras, crie style-custom.css e descomente abaixo -->
  <!-- <link rel="stylesheet" href="style-custom.css"/> -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div id="loginContainer" class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="app-icon">💰</div>
        <h1 class="login-title">Sistema de Empréstimos</h1>
        <p class="login-subtitle">Faça login para acessar o sistema</p>
      </div>
      <div id="loginError" class="login-error hidden">Usuário ou senha incorretos</div>
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="username">Usuário</label>
          <input type="text" id="username" class="form-control" required/>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Senha</label>
          <input type="password" id="password" class="form-control" required/>
        </div>
        <button type="submit" class="btn btn--primary btn--full-width">Entrar</button>
      </form>
      <div class="login-info">
        <p><strong>Teste:</strong> admin/123456 · gerente/123456 · operador/123456</p>
      </div>
    </div>
  </div>

  <div id="appContainer" class="app-container hidden">
    <aside id="sidebar" class="sidebar">
      <ul>
        <li class="nav-item" data-page="dashboard"><a href="#">Dashboard</a></li>
        <li class="nav-item" data-page="cadastro"><a href="#">Clientes</a></li>
        <li class="nav-item" data-page="emprestimos"><a href="#">Empréstimos</a></li>
        <li class="nav-item" data-page="historico"><a href="#">Histórico</a></li>
        <li class="nav-item admin-only" data-page="usuarios"><a href="#">Usuários</a></li>
      </ul>
    </aside>
    <main class="main-content">
      <header class="header">
        <div>
          <button onclick="sistema.toggleSidebar()">☰</button>
          <h2 id="pageTitle">Dashboard Financeiro</h2>
        </div>
        <div class="user-info">
          <span id="userName"></span> (<span id="userRole"></span>)
          <button onclick="sistema.logout()">Sair</button>
        </div>
      </header>
      <div id="pagesContainer" class="page-container"></div>
    </main>
  </div>

  <!-- Módulos do sistema -->
  <script src="utils.js"></script>
  <script src="dashboard.js"></script>
  <script src="clientes.js"></script>
  <script src="emprestimos.js"></script>
  <script src="historico.js"></script>
  <script src="usuarios.js"></script>

  <!-- Configuração Supabase e lógica principal -->
  <script src="env.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>

  <!-- Inicialização -->
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      window.sistema = new SistemaEmprestimos();
      document.getElementById('loginForm').addEventListener('submit', async e => {
        e.preventDefault();
        const ok = await sistema.login(
          document.getElementById('username').value,
          document.getElementById('password').value
        );
        if (ok) {
          document.getElementById('loginError').classList.add('hidden');
          sistema.showApp();
        } else {
          document.getElementById('loginError').classList.remove('hidden');
        }
      });
    });
  </script>
</body>
</html>
