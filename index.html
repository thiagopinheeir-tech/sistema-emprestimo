<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sistema de Empréstimos</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Biblioteca Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
  <!-- Configuração do Supabase -->
  <script src="env.js"></script>
  <!-- Chart.js para gráficos -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div id="loginContainer" class="hidden">
    <div class="login-card">
      <h1>Sistema de Empréstimos</h1>
      <form id="loginForm">
        <label for="username">Usuário</label>
        <input type="text" id="username" name="username" required />
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" required />
        <button type="submit" class="btn btn--primary">Entrar</button>
      </form>
      <p id="loginError" style="display:none;color:var(--color-error)">Credenciais inválidas</p>
    </div>
  </div>
  <div id="appContainer" class="hidden">
    <aside class="sidebar">
      <header class="sidebar-header">Sistema de Empréstimos</header>
      <nav class="sidebar-nav">
        <button class="nav-item" data-page="dashboard">Dashboard</button>
        <button class="nav-item" data-page="cadastro">Clientes</button>
        <button class="nav-item" data-page="emprestimos">Empréstimos</button>
        <button class="nav-item" data-page="historico">Histórico</button>
        <button class="nav-item admin-only" data-page="usuarios" style="display:none;">Usuários</button>
      </nav>
      <button class="sidebar-toggle">☰</button>
    </aside>
    <main class="main-content">
      <header class="header">
        <h1 id="pageTitle" class="page-title"></h1>
        <div class="header-user">
          <div id="userName"></div>
          <div id="userRole" class="user-role"></div>
          <button id="btnLogout" class="btn btn--danger">Sair</button>
        </div>
      </header>
      <section id="pagesContainer" class="page-container"></section>
    </main>
    <nav class="bottom-nav">
      <button class="nav-item" data-page="dashboard">🏠 Dashboard</button>
      <button class="nav-item" data-page="cadastro">👥 Clientes</button>
      <button class="nav-item" data-page="emprestimos">💰 Empréstimos</button>
      <button class="nav-item" data-page="historico">📜 Histórico</button>
      <button class="nav-item admin-only" data-page="usuarios" style="display:none;">⚙ Usuários</button>
    </nav>
  </div>

  <!-- Scripts na ORDEM EXATA - SEM DEFER -->
  <script src="utils.js"></script>
  <script src="app.js"></script>
  <script src="dashboard.js"></script>
  <script src="clientes.js"></script>
  <script src="emprestimos.js"></script>
  <script src="historico.js"></script>
  <script src="usuarios.js"></script>
  <script src="init.js"></script>

  <script>
    // Navegação lateral e inferior
    document.addEventListener('click', event => {
      const target = event.target;
      if (target.classList.contains('nav-item')) {
        if (window.sistema) {
          window.sistema.showPage(target.dataset.page);
        }
      }
      if (target.id === 'btnLogout') {
        if (window.sistema) {
          window.sistema.logout();
        }
      }
      if (target.classList.contains('sidebar-toggle')) {
        if (window.sistema) {
          window.sistema.toggleSidebar();
        }
      }
    });
    // Formulário de login
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const username = e.target.username.value;
      const password = e.target.password.value;
      if (!window.sistema) return;
      const success = await window.sistema.login(username, password);
      if (success) {
        window.sistema.showApp();
        document.getElementById('loginError').style.display = 'none';
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    });
  </script>
</body>
</html>
