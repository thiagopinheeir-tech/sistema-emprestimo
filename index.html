<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Sistema de Empréstimos</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div id="loginContainer" class="login-container">
    <div class="login-card">
      <div class="login-header">
        <span class="app-icon">💰</span>
        <h1 class="login-title">Sistema de Empréstimos</h1>
        <p class="login-subtitle">Acesse sua conta</p>
      </div>
      <div id="loginError" class="login-error hidden"></div>
      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="username">Usuário</label>
          <input type="text" id="username" required />
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" required />
        </div>
        <button type="submit" class="btn btn--primary btn--full-width">Entrar</button>
      </form>
      <div class="login-info">
        <small>Teste: admin/123456 &bull; gerente/123456 &bull; operador/123456</small>
      </div>
    </div>
  </div>

  <div id="appContainer" class="hidden">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <span class="app-title"><span class="app-icon">💰</span> Empréstimos</span>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item" data-page="dashboard" href="#" onclick="sistema.showPage('dashboard'); return false;">Dashboard</a>
        <a class="nav-item" data-page="cadastro" href="#" onclick="sistema.showPage('cadastro'); return false;">Clientes</a>
        <a class="nav-item" data-page="emprestimos" href="#" onclick="sistema.showPage('emprestimos'); return false;">Empréstimos</a>
        <a class="nav-item" data-page="historico" href="#" onclick="sistema.showPage('historico'); return false;">Histórico</a>
        <a class="nav-item admin-only" data-page="usuarios" href="#" onclick="sistema.showPage('usuarios'); return false;">Usuários</a>
      </nav>
    </aside>
    <main class="main-content">
      <header class="header flex">
        <button class="sidebar-toggle" onclick="sistema.toggleSidebar()">☰</button>
        <h2 id="pageTitle">Dashboard Financeiro</h2>
        <div class="user-info">
          <span id="userName"></span>
          <span class="user-role" id="userRole"></span>
          <button class="btn btn--outline btn--sm" onclick="sistema.logout()">Sair</button>
        </div>
      </header>
      <div id="pagesContainer" class="page-container"></div>
    </main>
  </div>

  <!-- Scripts -->
  <script src="utils.js"></script>
  <script src="dashboard.js"></script>
  <script src="clientes.js"></script>
  <script src="emprestimos.js"></script>
  <script src="historico.js"></script>
  <script src="usuarios.js"></script>

  <script src="env.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      window.sistema = new SistemaEmprestimos();

      document.getElementById('loginForm').addEventListener('submit', async e => {
        e.preventDefault();
        const ok = await sistema.login(
          document.getElementById('username').value,
          document.getElementById('password').value
        );
        if (ok) {
          document.getElementById('loginError').classList.add('hidden');
          sistema.showApp();
        } else {
          const errDiv = document.getElementById('loginError');
          errDiv.textContent = "Usuário ou senha incorretos";
          errDiv.classList.remove('hidden');
        }
      });
    });
  </script>
</body>
</html>
