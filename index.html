<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema de Empréstimos</title>
  <meta name="description" content="Sistema completo para gerenciamento de empréstimos, clientes e cobranças"/>
  <link rel="stylesheet" href="style.css"/>
  <!-- Chart.js e Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>
  <!-- Tela Login -->
  <div id="loginContainer" class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="app-icon">💰</div>
        <h1 class="login-title">Sistema de Empréstimos</h1>
        <p class="login-subtitle">Faça login para acessar o sistema</p>
      </div>
      <div id="loginError" class="login-error hidden"></div>
      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label class="form-label" for="username">Usuário</label>
          <input type="text" id="username" name="username" class="form-control" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Senha</label>
          <input type="password" id="password" name="password" class="form-control" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn--primary btn--full-width">Entrar no Sistema</button>
      </form>
      <div class="login-info">
        <small>
          <strong>Usuários de teste:</strong><br>
          👨‍💼 Admin: <code>admin / 123456</code><br>
          👩‍💼 Gerente: <code>gerente / 123456</code><br>
          👤 Operador: <code>operador / 123456</code>
        </small>
      </div>
    </div>
  </div>

  <!-- App Principal -->
  <div id="appContainer" class="hidden app-container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">
          <span class="app-icon">💰</span> Sistema de Empréstimos
        </div>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item" data-page="dashboard" onclick="sistema.showPage('dashboard');return false;">
          <span class="nav-icon">📊</span><span class="nav-text">Dashboard</span>
        </button>
        <button class="nav-item" data-page="cadastro" onclick="sistema.showPage('cadastro');return false;">
          <span class="nav-icon">👥</span><span class="nav-text">Clientes</span>
        </button>
        <button class="nav-item" data-page="emprestimos" onclick="sistema.showPage('emprestimos');return false;">
          <span class="nav-icon">💰</span><span class="nav-text">Empréstimos</span>
        </button>
        <button class="nav-item" data-page="historico" onclick="sistema.showPage('historico');return false;">
          <span class="nav-icon">📈</span><span class="nav-text">Histórico</span>
        </button>
        <button class="nav-item admin-only" data-page="usuarios" onclick="sistema.showPage('usuarios');return false;">
          <span class="nav-icon">⚙️</span><span class="nav-text">Usuários</span>
        </button>
      </nav>
    </aside>
    <main class="main-content">
      <header class="header">
        <div class="flex">
          <button class="sidebar-toggle" onclick="sistema.toggleSidebar()">☰</button>
          <h2 class="page-title" id="pageTitle">Dashboard Financeiro</h2>
        </div>
        <div class="header-user">
          <div class="user-info">
            <span class="user-name" id="userName"></span>
            <span class="user-role" id="userRole"></span>
          </div>
          <button class="btn btn--secondary btn--sm" onclick="sistema.logout()">🚪 <span>Sair</span></button>
        </div>
      </header>
      <div class="page active" id="pagesContainer"></div>
    </main>
  </div>

  <!-- Bottom Navigation Mobile -->
  <nav class="bottom-nav" id="bottomNav">
    <button class="nav-item" data-page="dashboard" onclick="sistema.showPage('dashboard');return false;">
      <span class="nav-icon">📊</span><span class="nav-label">Dashboard</span>
    </button>
    <button class="nav-item" data-page="cadastro" onclick="sistema.showPage('cadastro');return false;">
      <span class="nav-icon">👥</span><span class="nav-label">Clientes</span>
    </button>
    <button class="nav-item" data-page="emprestimos" onclick="sistema.showPage('emprestimos');return false;">
      <span class="nav-icon">💰</span><span class="nav-label">Empréstimos</span>
    </button>
    <button class="nav-item" data-page="historico" onclick="sistema.showPage('historico');return false;">
      <span class="nav-icon">📈</span><span class="nav-label">Histórico</span>
    </button>
    <button class="nav-item admin-only" data-page="usuarios" onclick="sistema.showPage('usuarios');return false;">
      <span class="nav-icon">⚙️</span><span class="nav-label">Usuários</span>
    </button>
  </nav>

  <!-- Ordem dos Scripts: -->
  <script src="env.js"></script>
  <script src="utils.js"></script>
  <script src="dashboard.js"></script>
  <script src="clientes.js"></script>
  <script src="emprestimos.js"></script>
  <script src="historico.js"></script>
  <script src="usuarios.js"></script>
  <script src="app.js"></script>

  <script>
    // Inicialização do sistema
    window.addEventListener('DOMContentLoaded', () => {
      window.sistema = new SistemaEmprestimos();

      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorDiv = document.getElementById('loginError');

        if (!username || !password) {
          errorDiv.textContent = "Por favor, preencha usuário e senha.";
          errorDiv.classList.remove('hidden');
          return;
        }

        // Estado de loading no botão
        const submitBtn = e.target.querySelector('button[type="submit"]');
        const origText = submitBtn.textContent;
        submitBtn.textContent = 'Entrando...';
        submitBtn.disabled = true;

        try {
          const success = await sistema.login(username, password);
          if (success) {
            errorDiv.classList.add('hidden');
            sistema.showApp();
          } else {
            errorDiv.textContent = "Usuário ou senha incorretos.";
            errorDiv.classList.remove('hidden');
          }
        } catch (error) {
          errorDiv.textContent = "Erro ao fazer login.";
          errorDiv.classList.remove('hidden');
        } finally {
          submitBtn.textContent = origText;
          submitBtn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
